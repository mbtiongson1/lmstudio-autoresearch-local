<!DOCTYPE html>
<html class="h-full" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>LM Studio AutoResearch Agent</title>
    <!-- Tailwind CSS CDN with plugins -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
          theme: {
            extend: {
              colors: {
                brand: {
                  cyan: '#00ffff',
                  dark: '#0f172a',
                  card: 'rgba(30, 41, 59, 0.5)',
                  border: 'rgba(255, 255, 255, 0.1)',
                }
              }
            }
          }
        }
    </script>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="h-full flex flex-col">
    <!-- BEGIN: MainLayout -->
    <div class="flex flex-1 overflow-hidden p-6 gap-6" data-purpose="main-layout-container">
        
        <!-- BEGIN: Sidebar -->
        <aside class="flex flex-col items-center py-8 glass-card rounded-2xl w-20 shrink-0 gap-6" data-purpose="navigation-sidebar">
            <!-- Icons -->
            <div id="nav-home" class="p-3 rounded-xl bg-brand-cyan/20 text-brand-cyan active-glow cursor-pointer transition-all hover:scale-105" data-purpose="sidebar-item-active">
                <svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
                </svg>
            </div>
            <div id="nav-history" class="p-3 text-slate-400 hover:text-brand-cyan cursor-pointer transition-colors">
                <svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
                </svg>
            </div>
            
            <div class="mt-auto p-3 text-slate-400 hover:text-brand-cyan cursor-pointer transition-colors">
                <svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
                </svg>
            </div>
        </aside>
        <!-- END: Sidebar -->

        <!-- BEGIN: DashboardContent -->
        <main class="flex-1 grid grid-cols-1 lg:grid-cols-2 gap-6 overflow-hidden">
            
            <!-- BEGIN: HistorySection -->
            <section id="history-section" class="glass-card rounded-2xl flex flex-col overflow-hidden hidden" data-purpose="history-column">
                <header class="p-6 flex items-center justify-between border-b border-brand-border">
                    <h2 class="text-xl font-semibold tracking-wide">Research History</h2>
                    <input id="history-search" class="bg-slate-800/80 border border-brand-border rounded-lg px-3 py-1 text-xs text-white" type="text" placeholder="Search history..."/>
                </header>
                <div class="p-6 overflow-y-auto space-y-4" id="history-list"></div>
            </section>

            <!-- BEGIN: ModelManagement (wrapped to toggle) -->
            <section id="model-section" class="glass-card rounded-2xl flex flex-col overflow-hidden" data-purpose="model-management-column">
                <header class="p-6 flex items-center justify-between border-b border-brand-border">
                    <div class="flex items-center gap-3">
                        <div class="text-brand-cyan">
                            <svg class="h-6 w-6" fill="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path d="M12,2A10,10 0 0,1 22,12A10,10 0 0,1 12,22A10,10 0 0,1 2,12A10,10 0 0,1 12,2M12,4A8,8 0 0,0 4,12A8,8 0 0,0 12,20A8,8 0 0,0 20,12A8,8 0 0,0 12,4M12,6A6,6 0 0,1 18,12A6,6 0 0,1 12,18A6,6 0 0,1 6,12A6,6 0 0,1 12,6M12,8A4,4 0 0,0 8,12A4,4 0 0,0 12,16A4,4 0 0,0 16,12A4,4 0 0,0 12,8Z"></path>
                            </svg>
                        </div>
                        <h2 class="text-xl font-semibold tracking-wide">Model Management</h2>
                    </div>
                    <button id="refresh-models-btn" class="p-2 text-slate-400 hover:text-brand-cyan transition-colors" title="Refresh Models">
                        <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                        </svg>
                    </button>
                </header>

                <!-- Model loading progress bar -->
                <div id="model-loading-progress-container" class="hidden px-6 pt-4">
                    <div class="flex justify-between text-[10px] text-slate-400 mb-1">
                        <span id="model-loading-text">Loading model...</span>
                    </div>
                    <div class="w-full bg-slate-800 h-1 rounded-full overflow-hidden">
                        <div id="model-loading-bar" class="bg-brand-cyan h-full w-0 transition-all duration-300"></div>
                    </div>
                </div>

                <div class="p-6 space-y-8 overflow-y-auto" id="models-list">
                    <div class="loading-spinner">Loading models...</div>
                </div>
            </section>
            <!-- END: ModelManagement -->

            <!-- BEGIN: ResearchWorkspace -->
            <section class="glass-card rounded-2xl flex flex-col overflow-hidden" data-purpose="research-workspace-column">
                <header class="p-6 flex items-center justify-between border-b border-brand-border">
                    <div class="flex items-center gap-3">
                        <div class="text-brand-cyan">
                            <svg class="h-6 w-6" fill="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path d="M11,4A7,7 0 0,1 18,11C18,12.5 17.5,14 16.61,15.19L17.42,16H18L23,21L21,23L16,18V17.41L15.19,16.6C14,17.5 12.5,18 11,18A7,7 0 0,1 4,11A7,7 0 0,1 11,4M11,6A5,5 0 0,0 6,11A5,5 0 0,0 11,16A5,5 0 0,0 16,11A5,5 0 0,0 11,6M10,7H12V10H15V12H12V15H10V12H7V10H10V7Z"></path>
                            </svg>
                        </div>
                        <h2 class="text-xl font-semibold tracking-wide">Research Workspace</h2>
                    </div>
                    <!-- Status Toggle (Indicator) -->
                    <div class="flex items-center gap-2">
                        <span id="status-badge" class="text-[10px] uppercase font-bold tracking-widest text-slate-500">Idle</span>
                        <div class="w-10 h-5 bg-slate-700 rounded-full p-1 relative transition-colors" id="status-toggle">
                            <div class="w-3 h-3 bg-slate-500 rounded-full absolute left-1 transition-all" id="status-toggle-dot"></div>
                        </div>
                    </div>
                </header>
                
                <div class="p-6 flex flex-col h-full gap-6">
                    <!-- Research Inputs -->
                    <div class="space-y-4">
                        <div class="flex items-center justify-between">
                            <label class="block text-xs font-medium text-slate-400">Active Model:</label>
                            <span id="research-active-model" class="text-xs font-mono text-brand-cyan">None</span>
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-slate-400 mb-2">Research Topic:</label>
                            <input id="topic-input" class="w-full bg-slate-800/80 border border-brand-border rounded-lg px-4 py-2 text-sm focus:ring-1 focus:ring-brand-cyan focus:border-brand-cyan outline-none transition-all text-white" type="text" placeholder="e.g. artificial intelligence AGI"/>
                        </div>
                        <div class="flex gap-4 items-end">
                            <div class="w-1/3">
                                <label class="block text-xs font-medium text-slate-400 mb-2">Max Turns:</label>
                                <select id="max-turns" class="w-full bg-slate-800/80 border border-brand-border rounded-lg px-4 py-2 text-sm focus:ring-1 focus:ring-brand-cyan focus:border-brand-cyan outline-none appearance-none text-white">
                                    <option value="4">4 Turns</option>
                                    <option value="8" selected>8 Turns</option>
                                    <option value="12">12 Turns</option>
                                    <option value="24">24 Turns</option>
                                </select>
                            </div>
                            <button id="start-btn" class="flex-1 bg-brand-cyan hover:bg-cyan-400 text-brand-dark font-bold py-2 rounded-lg transition-all active:scale-[0.98] active-glow disabled:opacity-50 disabled:cursor-not-allowed">
                                Start Research
                            </button>
                            <button id="pause-btn" class="hidden flex-1 bg-amber-500 hover:bg-amber-400 text-brand-dark font-bold py-2 rounded-lg transition-all active:scale-[0.98] active-glow">
                                Pause
                            </button>
                            <button id="resume-btn" class="hidden flex-1 bg-brand-cyan hover:bg-cyan-400 text-brand-dark font-bold py-2 rounded-lg transition-all active:scale-[0.98] active-glow">
                                Resume
                            </button>
                            <button id="stop-btn" class="hidden flex-1 bg-red-500 hover:bg-red-400 text-white font-bold py-2 rounded-lg transition-all active:scale-[0.98] active-glow">
                                Stop
                            </button>
                        </div>
                    </div>

                    <!-- Progress Section (Hidden by default) -->
                    <div id="status-section" class="space-y-2" style="display: none;">
                        <div class="flex justify-between text-xs text-slate-400">
                            <span>Progress: <span id="topic-display" class="text-brand-cyan italic"></span></span>
                            <span>Turn <span id="turn-display" class="text-white font-mono">0</span></span>
                        </div>
                        <div class="w-full bg-slate-800 h-1.5 rounded-full overflow-hidden">
                            <div id="progress-bar" class="bg-brand-cyan h-full active-glow transition-all duration-500" style="width: 0%"></div>
                        </div>
                    </div>

                    <!-- Research Output -->
                    <div class="flex-1 flex flex-col border border-brand-cyan/30 rounded-lg overflow-hidden" data-purpose="research-output-container">
                        <div class="px-4 py-2 text-[10px] uppercase font-bold tracking-widest bg-brand-cyan/10 text-brand-cyan border-b border-brand-cyan/20">
                            Research Output
                        </div>
                        <div id="output-container" class="terminal-window flex-1 p-4 text-brand-cyan/80 text-sm overflow-y-auto">
                            <div class="output-placeholder opacity-50 italic">&gt;_ Research output will appear here...</div>
                        </div>
                    </div>

                    <!-- Final Answer (Hidden by default) -->
                    <div id="answer-section" class="glass-card rounded-lg p-4 space-y-3 border-brand-cyan/20" style="display: none;">
                        <div class="text-brand-cyan text-xs font-bold uppercase tracking-wider">Final Analysis</div>
                        <div id="final-answer" class="text-sm text-slate-300 leading-relaxed max-h-48 overflow-y-auto"></div>
                        <button id="reset-btn" class="w-full text-xs text-slate-400 hover:text-white transition-colors py-2 border border-slate-700 rounded hover:border-slate-500">
                            Clear and Start New Research
                        </button>
                    </div>
                </div>
            </section>
            <!-- END: ResearchWorkspace -->
        </main>
        <!-- END: DashboardContent -->
    </div>
    <!-- END: MainLayout -->

    <!-- BEGIN: Footer -->
    <footer class="py-4 px-8 flex justify-between items-center text-[10px] text-slate-500 border-t border-brand-border bg-brand-dark/20" data-purpose="page-footer">
        <div>LM Studio AutoResearch Agent v0.1.1</div>
        <div class="flex items-center gap-2">
            <span class="w-1.5 h-1.5 rounded-full bg-brand-cyan"></span>
            Model: <span id="model-name" class="text-slate-300">Detecting...</span>
        </div>
    </footer>
    <!-- END: Footer -->

    <script src="/static/script.js"></script>
</body>
</html>
