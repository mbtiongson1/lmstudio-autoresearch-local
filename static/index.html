<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LM Studio AutoResearch Agent</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>🔬 LM Studio AutoResearch Agent</h1>
            <p class="subtitle">Real-time research powered by local LM Studio</p>
        </header>

        <main class="main-content">
            <!-- Input Section -->
            <section class="input-section">
                <div class="form-group">
                    <label for="topic-input">Research Topic:</label>
                    <input 
                        type="text" 
                        id="topic-input" 
                        placeholder="e.g., climate change, artificial intelligence, quantum computing..." 
                        class="topic-input"
                    >
                </div>
                <div class="form-group">
                    <label for="max-turns">Max Turns:</label>
                    <input 
                        type="number" 
                        id="max-turns" 
                        value="8" 
                        min="1" 
                        max="16" 
                        class="max-turns-input"
                    >
                </div>
                <button id="start-btn" class="btn btn-primary">Start Research</button>
            </section>

            <!-- Status Section -->
            <section class="status-section" id="status-section" style="display: none;">
                <div class="status-card">
                    <div class="status-header">
                        <h2>Research in Progress</h2>
                        <span class="status-badge" id="status-badge">Starting...</span>
                    </div>
                    <div class="progress-info">
                        <p><strong>Topic:</strong> <span id="topic-display"></span></p>
                        <p><strong>Turn:</strong> <span id="turn-display">0</span>/8</p>
                    </div>
                    <div class="progress-bar-container">
                        <div class="progress-bar" id="progress-bar"></div>
                    </div>
                </div>
            </section>

            <!-- Output Section -->
            <section class="output-section">
                <h2>Research Output</h2>
                <div class="output-container" id="output-container">
                    <div class="output-placeholder">Research output will appear here...</div>
                </div>
            </section>

            <!-- Final Answer Section -->
            <section class="answer-section" id="answer-section" style="display: none;">
                <h2>Final Answer</h2>
                <div class="answer-card">
                    <p id="final-answer"></p>
                </div>
                <button id="reset-btn" class="btn btn-secondary">Start New Research</button>
            </section>
        </main>

        <footer class="footer">
            <p>LM Studio AutoResearch Agent v0.1.0 | Model: <span id="model-name">gemma-4-2b</span></p>
        </footer>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
